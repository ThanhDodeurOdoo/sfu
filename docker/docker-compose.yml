version: '3.8'

services:
  sfu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: odoo-sfu
    restart: unless-stopped
    ports:
      - "8070:8070"
      - "${RTC_MIN_PORT:-40000}-${RTC_MAX_PORT:-49999}:${RTC_MIN_PORT:-40000}-${RTC_MAX_PORT:-49999}/tcp"
      - "${RTC_MIN_PORT:-40000}-${RTC_MAX_PORT:-49999}:${RTC_MIN_PORT:-40000}-${RTC_MAX_PORT:-49999}/udp"
    # Pass ALL environment variables from .env file to the container
    env_file:
      - .env
    networks:
      - sfu-network

  nginx:
    image: nginx:stable-alpine
    container_name: sfu-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - sfu
    networks:
      - sfu-network

networks:
  sfu-network:
    driver: bridge